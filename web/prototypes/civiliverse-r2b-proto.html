<style>

  #cartouche .title b{font-size:19px; letter-spacing:.16em; color:var(--gold)}
  #cartouche .title span{font-size:11px; color:var(--tx-dim); letter-spacing:.08em}
  .tabs{display:flex; gap:6px; margin-left:8px}
  .tab{
    font-size:12.5px; letter-spacing:.12em; padding:5px 14px; cursor:pointer;
    border:1px solid var(--gold-dim); color:var(--tx-dim); border-radius:2px;
    background:transparent; user-select:none;
  }
  .tab.on{color:var(--ink); background:var(--gold); border-color:var(--gold)}
  #filters{display:flex; align-items:center; gap:10px; margin-left:auto; font-size:12px; color:var(--tx-dim); flex-wrap:wrap}
  #filters label{cursor:pointer; display:flex; align-items:center; gap:4px; letter-spacing:.05em}
  #filters input{accent-color:var(--gold)}
  .btn{font-size:12px; padding:4px 10px; border:1px solid var(--gold-dim); color:var(--tx-dim);
       background:transparent; cursor:pointer; border-radius:2px; font-family:var(--serif); letter-spacing:.1em}
  .btn:hover{color:var(--gold); border-color:var(--gold)}

  /* ── 星图台 stage ── */
  #stage{position:relative; flex:1; min-height:0}
  svg#cosmos{position:absolute; inset:0; width:100%; height:100%; display:block; cursor:default}
  .bandline{stroke:var(--gold); stroke-opacity:.10; stroke-width:1}
  .bandlabel{fill:var(--tx-dim); font-size:11px; letter-spacing:.18em; opacity:.75}
  .axis text{fill:var(--tx-dim); font-size:10.5px; letter-spacing:.06em; opacity:.8}
  .axis line{stroke:var(--gold); stroke-opacity:.16}
  .region{cursor:pointer}
  .region rect{fill:var(--gold); fill-opacity:.045; stroke:var(--gold); stroke-opacity:.35; stroke-dasharray:1 3; rx:10}
  .region.child rect{fill-opacity:.07; stroke-dasharray:none; stroke-opacity:.45}
  .region text{fill:var(--gold); font-size:11.5px; letter-spacing:.14em; opacity:.85}
  .region:hover rect{fill-opacity:.12}
  .tether{stroke:var(--gold); stroke-opacity:.4; stroke-dasharray:2 4; fill:none}
  .tetherlabel{fill:var(--tx-dim); font-size:10px; opacity:.7}
  .edge{fill:none; opacity:.72}
  .edge.minor{opacity:.45}
  .edge.disputed{stroke-dasharray:5 4}
  .edge.ghostend{opacity:.30}
  .edge.dim{opacity:.06}
  .node{cursor:pointer}
  .node text{fill:var(--tx); font-size:12px; letter-spacing:.04em; paint-order:stroke; stroke:#0b0e15; stroke-width:3px}
  .node.dim{opacity:.12}
  .node.sel .halo{opacity:.9}
  .halo{opacity:0; transition:opacity .2s}
  .ghost{cursor:pointer}
  .ghost circle{fill:#cbbd97; opacity:.34}
  .ghost.atro path{opacity:.5}
  .ghost.dim{opacity:.05}
  .ghost:hover circle{opacity:.8}

  /* 星系视图 */
  #galaxy{position:absolute; inset:0; display:none}
  .nebula{cursor:pointer}
  .nebula:hover .neb-core{opacity:.5}

  /* ── 词条抽屉 drawer ── */
  #drawer{
    position:absolute; top:64px; right:0; width:340px; max-height:calc(100% - 140px);
    overflow:auto; padding:16px 18px; display:none; z-index:5;
    background:linear-gradient(180deg,#151a29f2,#0f1420f2);
    border:1px solid var(--gold-dim); border-right:none; border-radius:3px 0 0 3px;
  }
  #drawer h3{color:var(--gold); font-size:16px; letter-spacing:.1em; margin-bottom:2px}
  #drawer .en{color:var(--tx-dim); font-size:11px; font-style:italic; margin-bottom:8px}
  #drawer .meta{font-size:11px; color:var(--tx-dim); margin-bottom:10px; line-height:1.7}
  #drawer .meta b{color:var(--tx)}
  #drawer .loc{font-size:12.5px; line-height:1.8; color:var(--tx); font-style:italic; border-left:2px solid var(--gold-dim); padding-left:10px; margin-bottom:10px}
  #drawer .sum{font-size:12.5px; line-height:1.9; color:#d8ceb2; margin-bottom:12px}
  #drawer .land{width:100%; padding:7px 0; font-size:13px; letter-spacing:.2em; background:var(--gold); color:var(--ink);
    border:none; cursor:pointer; font-family:var(--serif); border-radius:2px; margin-top:2px}
  #drawer .close{position:absolute; top:8px; right:10px; background:none; border:none; color:var(--tx-dim); font-size:15px; cursor:pointer}
  .badge{display:inline-block; font-size:10px; padding:1px 7px; border:1px solid var(--gold-dim); color:var(--gold); border-radius:8px; margin-right:5px; letter-spacing:.1em}
  .badge.red{border-color:#a24; color:#d67}

  /* ── 图例与设计说明 ── */
  .panel{
    position:absolute; bottom:34px; left:14px; z-index:6; width:300px; max-height:56vh; overflow:auto;
    background:#12172699; border:1px solid var(--gold-dim); border-radius:3px; padding:12px 14px;
    backdrop-filter:blur(3px); display:none; font-size:11.5px; line-height:1.8;
  }
  .panel h4{color:var(--gold); font-size:12.5px; letter-spacing:.18em; margin:8px 0 4px}
  .panel h4:first-child{margin-top:0}
  .panel .row{display:flex; align-items:center; gap:8px; color:var(--tx-dim)}
  .sw{display:inline-block; width:22px; height:0; border-top:2px solid; flex:none}
  .dot{display:inline-block; width:9px; height:9px; border-radius:50%; flex:none}
  #specs{left:auto; right:14px; width:360px}
  #specs p{color:#cfc4a6; margin-bottom:7px}
  #specs b{color:var(--gold)}
  #specs .small{font-size:10.5px; color:var(--tx-dim)}

  /* ── 星球层 planet ── */
  #planet{position:absolute; inset:0; z-index:20; display:none; flex-direction:column; background:var(--ink)}
  #planet.show{display:flex}
  #sky{position:relative; flex:1.2; min-height:0; overflow:hidden;
       background:radial-gradient(ellipse at 50% 130%, #1c2340 0%, #0b0e15 62%)}
  #sky svg{position:absolute; inset:0; width:100%; height:100%}
  #skycap{position:absolute; top:12px; left:18px; color:var(--tx-dim); font-size:11.5px; letter-spacing:.25em}
  #ascend{position:absolute; top:10px; right:16px; z-index:2}
  #ground{flex:1; min-height:0; overflow:auto; background:
      linear-gradient(180deg, var(--parch), var(--parch2));
      color:#33291a; padding:20px 8vw 40px; border-top:3px double var(--gold-dim); position:relative}
  #ground.mourn{background:linear-gradient(180deg,#e7e2d5,#d9d4c6)}
  #ground h2{font-size:22px; letter-spacing:.12em; color:#2c2413}
  #ground .gen{font-style:italic; color:#6b5b3a; font-size:12px; margin-bottom:2px}
  #ground .gcap{font-size:11px; color:#6b5b3a; letter-spacing:.22em; margin:6px 0 12px}
  #ground .quote{border-left:3px solid var(--gold-dim); padding:6px 14px; margin:12px 0; font-size:14px; line-height:2; color:#41341d; background:#fff3}
  #ground .quote .src{font-size:11px; color:#6b5b3a; display:block; margin-top:4px}
  #ground .sec{margin:14px 0}
  #ground .sec h5{font-size:12px; letter-spacing:.3em; color:#8a7440; margin-bottom:6px}
  #ground .sec p{font-size:13.5px; line-height:2.05; text-align:justify}
  #ground .vrow{display:flex; gap:0; align-items:stretch; margin-top:8px; border-top:1px solid #8a744066}
  #ground .ver{flex:1; padding:8px 10px; border-right:1px solid #8a744033; font-size:12px; line-height:1.7}
  #ground .ver b{display:block; color:#2c2413}
  #ground .ver span{color:#6b5b3a; font-size:11px}
  #ground .cavs li{font-size:12px; line-height:1.9; color:#5a4b2e; margin-left:18px}
  #ground .refs{font-size:11.5px; color:#6b5b3a; line-height:1.9}
  #ground .ebadge{display:inline-block; font-size:10.5px; border:1px solid #8a7440; border-radius:9px; padding:1px 8px; margin:0 6px 6px 0; color:#5a4b2e}
  .mournbadge{display:inline-block; font-size:10.5px; padding:2px 9px; border:1px solid #7a2a2a; color:#7a2a2a; border-radius:2px; letter-spacing:.15em; margin-bottom:8px}

  /* tooltip / footer */
  #tip{position:fixed; z-index:50; display:none; max-width:280px; padding:7px 10px; font-size:11.5px; line-height:1.7;
       background:#0f1420f0; border:1px solid var(--gold-dim); color:var(--tx); border-radius:2px; pointer-events:none}
  #foot{display:flex; gap:16px; padding:5px 18px; font-size:10.5px; color:var(--tx-dim);
        border-top:1px solid var(--line); letter-spacing:.06em; background:#0d111c}

  .corner{position:absolute; width:34px; height:34px; border:1px solid var(--gold-dim); opacity:.5; pointer-events:none}
  .c1{top:70px; left:8px; border-right:none; border-bottom:none}
  .c2{top:70px; right:8px; border-left:none; border-bottom:none}
  .c3{bottom:30px; left:8px; border-right:none; border-top:none}
  .c4{bottom:30px; right:8px; border-left:none; border-top:none}
</style>
</head>

  var ctxIndex = {};

  D.CONTEXTS.forEach(function(c){
    var b = BANDS[c.culture]; if(!b) return;

    var isChild = !!c.parent;

    var yTop = b.top + pad, hh = b.h - pad*2;
    if(isChild){
      if(c.id==="song-dynasty"){ yTop = b.top + b.h*0.14; hh = b.h*0.40; }
      if(c.id==="mongol-yuan"){ yTop = b.top + b.h*0.55; hh = b.h*0.42; } /* 贴向草原带边界 */
      if(c.id==="meiji-japan"){ yTop = b.top + b.h*0.14; hh = b.h*0.44; }
    }
    var g = el("g",{"class":"region"+(isChild?" child":""),"data-ctx":c.id}, gCtx);
    el("rect",{x:x,y:yTop,width:Math.max(x2-x,26),height:hh,rx:10}, g);
    el("text",{x:x+8,y:yTop+15}, g, c.zh + (isChild? "": " ⌂"));
    if(c.tether){

      el("text",{x:mx+5,y:(yTop+tb.top+tb.h)/2,"class":"tetherlabel"}, gCtx, "西学影响（culture_secondary）");

    g.addEventListener("mousemove", function(ev){ tip(ev, "<b>时代背景 · "+c.zh+"</b><br>"+(c.parent? "父背景："+ctxIndex[c.parent].zh+"（嵌套）": "父背景（可含次级背景）")+"<br><i>点击查看背景介绍</i>"); });
    g.addEventListener("mouseleave", hideTip);
  });

  /* ── 节点定位 ── */
  var POS = {}, ALL = {};
  D.NODES.forEach(function(n){ALL[n.id]={type:n.type, zh:n.zh, real:true, node:n}});
  D.GHOSTS.forEach(function(g){ALL[g.id]={type:g.type, zh:g.zh, real:false, node:g}});
  var NUDGE = {"cai-lun":.2,"movable-type":.62,"library-of-alexandria":.5,"printing-revolution":.3,
               "great-famine-ireland":.72,"ddt":.5,"silent-spring":.18,"rachel-carson":.42,
               "environmental-movement":.62,"pesticide-regulation":.4,"ddt-ecological-crisis":.5};
  D.NODES.forEach(function(n){

  var ERAR = {"深古":[-3200,-150], "中古":[560,1440], "近早":[1520,1780], "工当":[1815,1995]};
  D.GHOSTS.forEach(function(g){
    var r = ERAR[g.era], yv = r[0] + hash(g.id)* (r[1]-r[0]);
    POS[g.id] = {x:tx(yv), y:bandY(g.culture, hash(g.id+"y"))};
  });
  /* 局部避让：同带同 x 邻近的散开（确定性微调）*/
  (function(){
    var ids = Object.keys(POS);
    for(var it=0; it<3; it++){
      for(var i=0;i<ids.length;i++) for(var j=i+1;j<ids.length;j++){
        var a=POS[ids[i]], b=POS[ids[j]];
        var dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy;
        if(d2<520){ var push=(hash(ids[i]+ids[j])>.5?1:-1)*4; a.y+=push; b.y-=push; }
      }
    }
  })();

  /* ── 边 ── */
  var defs = el("defs",{});
  Object.keys(D.EDGETYPES).forEach(function(k){
    var m = el("marker",{id:"arr-"+k, viewBox:"0 0 10 10", refX:9, refY:5, markerWidth:7, markerHeight:7, orient:"auto-start-reverse"}, defs);
    el("path",{d:"M 0 1 L 9 5 L 0 9 z", fill:D.EDGETYPES[k].c}, m);
  });
  D.EDGES.forEach(function(e){
    var a=POS[e.s], b=POS[e.t]; if(!a||!b) return;
    var ghostEnd = !(ALL[e.s].real && ALL[e.t].real);
    var mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    var nx=-(b.y-a.y), ny=(b.x-a.x), nl=Math.sqrt(nx*nx+ny*ny)||1;
    var bend = 22 + 30*hash(e.s+e.t);
    var cx=mx+nx/nl*bend, cy=my+ny/nl*bend;
    var p = el("path",{d:"M "+a.x+" "+a.y+" Q "+cx+" "+cy+" "+b.x+" "+b.y,
      "class":"edge"+(e.imp==="minor"?" minor":"")+(e.disputed?" disputed":"")+(ghostEnd?" ghostend":""),
      stroke:D.EDGETYPES[e.ty].c, "stroke-width": e.ty==="regulates"? 2.6 : (e.imp==="major"? 1.7:1.1),
      "data-s":e.s, "data-t":e.t}, gEdges);
    if(e.ty!=="parallels") p.setAttribute("marker-end","url(#arr-"+e.ty+")");
    p.addEventListener("mousemove", function(ev){
      tip(ev, "<b>"+ALL[e.s].zh+" —"+D.EDGETYPES[e.ty].zh+"（"+e.ty+"）→ "+ALL[e.t].zh+"</b>"+(e.r1? " <span style='color:#d4472a'>r1</span>":"")+(e.disputed?" · disputed":"")+"<br>"+e.n);
    });

  /* ── 形状 ── */
  function shape(g, type, s, color, atro){
    if(type==="tech"){ el("polygon",{points:(-s)+",0 0,"+(-s)+" "+s+",0 0,"+s, fill:color, stroke:"#0b0e15","stroke-width":1}, g); }

    else if(type==="person"){ el("path",{d:"M 0 "+(-s)+" L "+(s*.24)+" "+(-s*.24)+" L "+s+" 0 L "+(s*.24)+" "+(s*.24)+" L 0 "+s+" L "+(-s*.24)+" "+(s*.24)+" L "+(-s)+" 0 L "+(-s*.24)+" "+(-s*.24)+" Z", fill:color, stroke:"#0b0e15","stroke-width":.8}, g); }
    else if(type==="wonder"){ var pts=[]; for(var i=0;i<6;i++){var a=Math.PI/6+i*Math.PI/3; pts.push((s*Math.cos(a))+","+(s*Math.sin(a)));} el("polygon",{points:pts.join(" "), fill:color, stroke:"#0b0e15","stroke-width":1}, g); }
    else { /* disaster 裂痕暗星 */
      var pts2=[]; for(var j=0;j<12;j++){var a2=j*Math.PI/6; var rr=(j%2? s*.45: s); pts2.push((rr*Math.cos(a2))+","+(rr*Math.sin(a2)));}
      el("polygon",{points:pts2.join(" "), fill:"#191219", stroke:color,"stroke-width":1.6}, g);
      el("line",{x1:-s*.4,y1:s*.28,x2:s*.34,y2:-s*.36, stroke:color,"stroke-width":1,"stroke-opacity":.8}, g);

  });

  /* ── 聚焦 ── */
  var SEL = null;
  function neighbors(id){
    var set = {}; set[id]=1;

    return set;
  }
  function select(id){
    SEL = id;
    var nb = neighbors(id);
    gNodes.querySelectorAll(".node").forEach(function(g){
      g.classList.toggle("dim", !(g.getAttribute("data-id") in nb));
      g.classList.toggle("sel", g.getAttribute("data-id")===id);
    });

      g.classList.toggle("dim", !(g.getAttribute("data-id") in nb));
    });
    gEdges.querySelectorAll(".edge").forEach(function(p){
      p.classList.toggle("dim", !(p.getAttribute("data-s")===id || p.getAttribute("data-t")===id));

    var era = (n.y0<0? "前"+(-n.y0): n.y0) + (n.y1? "–"+(n.y1<0? "前"+(-n.y1): n.y1):"") + (n.circa? "（约）":"");

      + "<h3>"+esc(n.zh)+"</h3><div class='en'>"+esc(n.en||"")+"</div>"
      + "<div class='meta'>"
      + "<span class='badge'>"+D.TYPEZH[n.type]+(n.subtype? " · "+n.subtype:"")+"</span>"

      + "<span class='badge'>"+(n.tier==="major"?"主星 major":"辅星 minor")+"</span>"

  /* ── 星球层 ── */

    }
    var cx0=sw/2, cy0=sh*0.92;
    el2(skysvg,"circle",{cx:cx0,cy:cy0,r:46,fill:"#c9a961",opacity:.12});
    el2(skysvg,"circle",{cx:cx0,cy:cy0,r:22,fill:"#c9a961",opacity:.25});

    var rel = D.EDGES.filter(function(e){return e.s===id||e.t===id});
    rel.forEach(function(e,i){
      var other = e.s===id? e.t : e.s;
      var ang = Math.PI*(0.14 + 0.72*(i/(Math.max(rel.length-1,1))));
      var rr = sh*0.62;
      var x = cx0 + rr*Math.cos(Math.PI-ang), y = cy0 - rr*Math.sin(ang);
      var col = D.EDGETYPES[e.ty].c;
      el2(skysvg,"line",{x1:cx0,y1:cy0-8,x2:x,y2:y,stroke:col,"stroke-width":e.ty==="regulates"?2.4:1.2,opacity:.75,"stroke-dasharray":e.disputed?"5 4":"none"});
      var star = el2(skysvg,"circle",{cx:x,cy:y,r:ALL[other].real?5:3,fill:ALL[other].real?"#e8ddc2":"#8f866c",style:"cursor:pointer"});
      el2(skysvg,"text",{x:x,y:y-10,fill:"#b0a486","text-anchor":"middle","font-size":11}, ALL[other].zh);
      el2(skysvg,"text",{x:(cx0+x)/2,y:(cy0+y)/2-6,fill:col,"text-anchor":"middle","font-size":10,opacity:.9},

      + "<h2>"+esc(n.zh)+"</h2><div class='gen'>"+esc(n.en||"")+"</div>"

      + "<div class='sec'><h5>摘要（正文全文随批产入仓）</h5><p>"+esc(n.sum)+"</p></div>"
      + vh
      + "<div class='sec'><h5>边即论证</h5><div>"+edgesH+"</div></div>"
      + "<div class='sec'><h5>置信 · "+n.conf+"</h5><ul class='cavs'>"+n.cavs.map(function(c){return "<li>"+esc(c)+"</li>"}).join("")+"</ul></div>"
      + "<div class='sec'><h5>参考文献</h5><div class='refs'>"+n.refs.map(esc).join("｜")+"</div></div>";
    ground.scrollTop = 0;
  }
  function el2(parent,n,attrs,txt){var e=document.createElementNS(NS,n);for(var k in attrs)e.setAttribute(k,attrs[k]);if(txt!=null)e.textContent=txt;parent.appendChild(e);return e}
  document.getElementById("ascend").onclick=function(){planet.classList.remove("show")};

     "三层结构 · 第一层：星系/星团（族的 LOD 聚合，A-1）——例：「合成杀虫剂族」远景为一星，降入星图层始见 DDT 个例与 derives 边");

  /* ── 视图切换 ── */
  var tabGal=document.getElementById("tabGal"), tabStar=document.getElementById("tabStar");
  function setView(v){
    var star = v==="star";
    [gBands,gAxis,gCtx,gEdges,gGhost,gNodes].forEach(function(g){g.style.display= star? "":"none"});
    gGal.style.display = star? "none":"";
    tabGal.classList.toggle("on",!star); tabStar.classList.toggle("on",star);
    clearSel();
  }
  tabGal.onclick=function(){setView("gal")};
  tabStar.onclick=function(){setView("star")};

  /* ── 滤镜 ── */
  document.querySelectorAll("#filters input[data-t]").forEach(function(cb){
    cb.addEventListener("change", function(){
      var t=cb.getAttribute("data-t"), on=cb.checked;
      gNodes.querySelectorAll(".node[data-type='"+t+"']").forEach(function(g){g.style.display=on?"":"none"});
      gGhost.querySelectorAll(".ghost[data-type='"+t+"']").forEach(function(g){g.style.display=on?"":"none"});
    });
  });
  document.getElementById("fGhost").addEventListener("change", function(){ gGhost.style.display=this.checked?"":"none" });
  document.getElementById("fCtx").addEventListener("change", function(){ gCtx.style.display=this.checked?"":"none" });

  /* ── 图例 ── */
  var legend = document.getElementById("legend");
  legend.innerHTML = "<h4>五类节点</h4>"
    + [["tech","◆ 技术（菱星）"],["idea","◎ 思想（环星）"],["person","✦ 人物（光点）"],["wonder","⬢ 奇观（晶面）"],["disaster","✧ 灾祸（裂痕暗星·无辉光）"]]
      .map(function(x){return "<div class='row'>"+x[1]+"</div>"}).join("")
    + "<div class='row' style='margin-top:2px'>灰环裂星＝atrocity（r1 新增子类）· 零幽默</div>"
    + "<h4>十一文明（颜色不单独承载信息）</h4>"
    + D.CULTURES.map(function(c){return "<div class='row'><span class='dot' style='background:"+c.c+"'></span>"+c.zh+"</div>"}).join("")
    + "<h4>十种边（r1）</h4>"
    + Object.keys(D.EDGETYPES).map(function(k){var e=D.EDGETYPES[k];
        return "<div class='row'><span class='sw' style='border-color:"+e.c+"'></span>"+e.zh+" "+k+(e.r1? " <b style='color:#d4472a'>r1 新增</b>":"")+"</div>"}).join("")
    + "<div class='row' style='margin-top:4px'>虚线＝disputed · 细淡＝端点为规划节点</div>"
    + "<div class='row'>主星大 · 辅星小（tier）</div>";
  var specs = document.getElementById("specs");
  specs.innerHTML = "<h4>设计说明（概念稿要点 · 全文见项目文档）</h4>"
    + "<p><b>三层宇宙结构（A-1）</b>：①星系视图＝族/主题的 LOD 聚合（远景一片，近景个例）；②星图视图＝节点与边；③星球层＝点击「降落」——仰望天空是关系星空（边即论证的星座），俯视大地是词条内容（版本谱系、引文、置信、文献）。VR 为远期。</p>"
    + "<p><b>时代背景区域（A-5/9）</b>：文明×年代的可点击范围区。嵌套已按裁定③演示：中华 ⊃ 宋朝｜蒙元｜明治日本；蒙元贴向草原带边界（A-8 空间语义），明治以虚线牵引朝西方带（culture_secondary 的视觉表达）。中世纪盛期待 latin-west 父区（batch-2）。</p>"
    + "<p><b>r1 词表已入渲染</b>：regulates 边（朱砂色、加粗）闭合 DDT 回路；atrocity 子类以灰纱环裂星呈现，无任何奇观化处理。</p>"
    + "<p><b>整改落图</b>：#1 applies→informs；#3 统一 inspires；#4 沈括错挂边已删（待 shen-kuo 建成回挂）；#5 patronized 反向边撤下；#9 简名 id（reformation 等）、疫霉不立节点。</p>"
    + "<p class='small'>数据：内容组 R2 实产 11 词条＋5 时代背景（全文随批产入仓）；小点为批产名单规划位（时位示意）。布局确定性：seed 20260718，分段时间比例尺＋文明带哈希抖动，任何人重跑同版本得逐像素相同结果。</p>";
  document.getElementById("bLegend").onclick=function(){legend.style.display= legend.style.display==="block"?"none":"block"};
  document.getElementById("bSpecs").onclick=function(){specs.style.display= specs.style.display==="block"?"none":"block"};

  /* ── tooltip ── */
  var tipEl = document.getElementById("tip");
  function tip(ev, html){ tipEl.innerHTML=html; tipEl.style.display="block";
    var x=ev.clientX+14, y=ev.clientY+12;
    if(x+300>innerWidth) x=ev.clientX-300; if(y+120>innerHeight) y=ev.clientY-110;
    tipEl.style.left=x+"px"; tipEl.style.top=y+"px"; }
  function hideTip(){ tipEl.style.display="none" }

  /* 默认展示：聚焦 DDT 回路的闭合（开场即讲重点） */
  setView("star");
  legend.style.display="block";
})();
/*APP-END*/
</script>
</body>
</html>
