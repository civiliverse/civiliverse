edges:
  - schema_version: 1
    source: papermaking
    target: woodblock-printing
    type: enables
    importance: major
    note:
      zh: 无纸不成雕印
      en: No paper, no woodblock printing
  - schema_version: 1
    source: nalanda
    target: house-of-wisdom
    type: parallels
    importance: major
    note:
      zh: 跨文明知识奇观群的又一呼应
      en: Another echo in the cross-civilizational cluster of knowledge wonders
  - schema_version: 1
    source: gutenberg
    target: gutenberg-press
    type: contributed
    importance: major
    note:
      zh: 古登堡集成金属活字系统
      en: Gutenberg integrated the metal-type system
  - schema_version: 1
    source: cuneiform
    target: phoenician-alphabet
    type: parallels
    importance: minor
    note:
      zh: 两河楔形与地中海字母并非直系传承——字母另承埃及圣书字，此处并列以破「书写单线进化」误解
      en: Mesopotamian wedges and the Mediterranean alphabet are not a direct lineage—the alphabet descends from Egyptian; paired here to dispel the myth of writing's single-line evolution
  - schema_version: 1
    source: phoenician-alphabet
    target: hindu-arabic-numerals
    type: parallels
    importance: minor
    note:
      zh: 两套跨文明流布的记号系统——一记语言、一记数量，都以「少量符号的组合」征服繁复
      en: Two cross-civilizational notation systems—one for language, one for quantity—each conquering complexity by combining a few signs
  - schema_version: 1
    source: phoenician-alphabet
    target: gutenberg-press
    type: applies
    importance: minor
    note:
      zh: 拼音文字仅数十字母，被古登堡活字系统所应用/落实（少量字模即可量产）；applies 演示正例
      en: An alphabetic script of only a few dozen letters, applied and realized in Gutenberg's type system (mass production from few matrices); an exemplar of the applies edge
  - schema_version: 1
    source: papyrus
    target: papermaking
    type: parallels
    importance: minor
    note:
      zh: 两种独立起源的书写材料，纸最终取代纸草（见造纸术引文）
      en: Two independently originated writing materials; paper finally displaced papyrus (see the Papermaking quote)
  - schema_version: 1
    source: zero-place-value
    target: hindu-arabic-numerals
    type: enables
    importance: major
    note:
      zh: 零与位值制是这套数字得以运算的内核
      en: Zero and place-value are the operative core that makes the numerals calculable
  - schema_version: 1
    source: al-khwarizmi
    target: hindu-arabic-numerals
    type: contributed
    importance: major
    note:
      zh: 《印度数字算术》将印度数码系统西传（「算法」一词即源于其名）
      en: His treatise on Indian reckoning carried the numerals westward (the word "algorithm" comes from his name)
  - schema_version: 1
    source: hindu-arabic-numerals
    target: double-entry-bookkeeping
    type: enables
    importance: major
    note:
      zh: 便于笔算的数字为商业算术与复式记账铺路
      en: Easy pen-reckoning numerals paved the way for commercial arithmetic and double-entry bookkeeping
  - schema_version: 1
    source: al-khwarizmi
    target: house-of-wisdom
    type: contributed
    importance: major
    note:
      zh: 花拉子米为智慧宫核心学者
      en: Al-Khwarizmi was a core scholar of the House of Wisdom
  - schema_version: 1
    source: house-of-wisdom
    target: hindu-arabic-numerals
    type: enables
    importance: minor
    note:
      zh: 智慧宫的翻译—研究运动为印度数字西传的枢纽
      en: The House of Wisdom's translation-research movement was the hub of the numerals' westward passage
  - schema_version: 1
    source: house-of-wisdom
    target: timbuktu-manuscripts
    type: parallels
    importance: minor
    note:
      zh: 伊斯兰世界学术奇观群的呼应
      en: An echo within the constellation of Islamic-world scholarly wonders
  - schema_version: 1
    source: grand-canal
    target: woodblock-printing
    type: enables
    importance: minor
    disputed: true
    note:
      zh: 运河沟通南北、支撑宋代商业与书籍市场的物流基础（环境性使能，程度存疑）
      en: The canal's north–south integration underpinned the logistics of Song commerce and the book market (an environmental enabling; degree disputed)
  - schema_version: 1
    source: house-of-wisdom
    target: heliocentrism
    type: informs
    importance: minor
    disputed: true
    note:
      zh: 伊斯兰天文（马拉盖学派诸模型）为哥白尼所承（程度有争议）
      en: Islamic astronomy (the Maragha-school models) fed Copernicus (degree disputed)
  - schema_version: 1
    source: shen-kuo
    target: movable-type
    type: contributed
    importance: minor
    note:
      zh: 《梦溪笔谈》为毕昇活字唯一近世记录（记录者义）
      en: The Dream Pool Essays is the sole near-contemporary record of Bi Sheng's type
  - schema_version: 1
    source: gutenberg-press
    target: printing-revolution
    type: enables
    importance: major
    note:
      zh: 印刷革命的物质引擎
      en: The material engine of the printing revolution
  - schema_version: 1
    source: papyrus
    target: library-of-alexandria
    type: enables
    importance: minor
    note:
      zh: 图书馆藏卷以纸草为载体，埃及纸草为其物质前提
      en: The Library's scrolls were papyrus; Egyptian papyrus was its material precondition
  - schema_version: 1
    source: library-of-alexandria
    target: house-of-wisdom
    type: parallels
    importance: major
    note:
      zh: 跨文明「知识奇观」星群的又一呼应
      en: Another echo in the cross-civilizational constellation of knowledge wonders
  - schema_version: 1
    source: library-of-alexandria
    target: timbuktu-manuscripts
    type: parallels
    importance: minor
    note:
      zh: 跨文明「知识奇观」星群的又一呼应
      en: Another echo in the cross-civilizational constellation of knowledge wonders
  - schema_version: 1
    source: printing-revolution
    target: heliocentrism
    type: enables
    importance: minor
    disputed: true
    note:
      zh: 印刷使天文表与新说得以广传（使能之一）
      en: Printing let astronomical tables and the new theory spread widely (an enabling factor)
  - schema_version: 1
    source: printing-revolution
    target: double-entry-bookkeeping
    type: enables
    importance: minor
    note:
      zh: 帕乔利《大全》为印本，复式记账借印刷标准化、流播欧洲
      en: Pacioli's Summa was printed; double-entry was standardized and spread through Europe by print
  - schema_version: 1
    source: shen-kuo
    target: compass
    type: contributed
    importance: minor
    note:
      zh: 首记磁针磁偏角
      en: First record of magnetic declination
  - schema_version: 1
    source: zero-place-value
    target: maya-calendar
    type: parallels
    importance: minor
    disputed: true
    note:
      zh: 玛雅长纪历独立发展出位值零号，跨文明的又一次「无中生有」
      en: The Maya Long Count independently developed a positional zero—another cross-civilizational "something from nothing"
  - schema_version: 1
    source: zero-place-value
    target: algebra
    type: enables
    importance: minor
    note:
      zh: 位值与零为符号代数备下记数基础
      en: Place-value and zero provided the notational basis for symbolic algebra
  - schema_version: 1
    source: al-khwarizmi
    target: algebra
    type: contributed
    importance: major
    note:
      zh: 《还原与对消之书》奠定代数并贡献「algebra」一词
      en: The Kitab al-jabr founded algebra and gave the word "algebra"
  - schema_version: 1
    source: house-of-wisdom
    target: algebra
    type: enables
    importance: major
    note:
      zh: 花拉子米在其学术圈内奠立代数
      en: Algebra was founded within its scholarly circle
  - schema_version: 1
    source: optics-alhazen
    target: scientific-method
    type: inspires
    importance: minor
    note:
      zh: 海什木《光学》的实验—数学进路为近代科学方法之先声
      en: Ibn al-Haytham's experimental-mathematical Optics was a forerunner of the modern scientific method
  - schema_version: 1
    source: scientific-method
    target: scientific-revolution
    type: enables
    importance: major
    disputed: true
    note:
      zh: 方法论是科学革命的引擎（作为「内核」抑或「产物」之关系有诠释差异）
      en: The method was the engine of the Scientific Revolution (whether "core" or "product," the relation admits interpretive difference)
  - schema_version: 1
    source: heliocentrism
    target: scientific-revolution
    type: inspires
    importance: major
    disputed: true
    note:
      zh: 哥白尼革命为科学革命的象征性开端（作为「开端」或「组成」之关系有诠释差异）
      en: The Copernican revolution as the emblematic opening of the Scientific Revolution (whether "opening" or "component," admitting interpretive difference)
  - schema_version: 1
    source: reformation
    target: scientific-revolution
    type: parallels
    importance: minor
    disputed: true
    note:
      zh: 印刷催化下的两场近代思想剧变（并置，不预设因果）
      en: Two early-modern upheavals of thought catalyzed by print (juxtaposed, no causation presumed)
